name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  frontend:
    name: Frontend (typecheck + lint + test)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm test

  e2e:
    name: E2E (Playwright)
    runs-on: macos-latest
    needs: [frontend]
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec playwright install chromium --with-deps
      - run: pnpm e2e
        env:
          VITE_COGNITO_USER_POOL_ID: us-east-1_TESTPOOL
          VITE_COGNITO_CLIENT_ID: test-client-id
          VITE_COGNITO_DOMAIN: https://mock-cognito.auth.us-east-1.amazoncognito.com

  rust:
    name: Rust (fmt + check + clippy + test)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      # macos-15-arm64 image 20260511.0048.1 ships a Homebrew `cargo` shim
      # that resolves to `rustup-init` and shadows ~/.cargo/bin/cargo on
      # $PATH. dtolnay/rust-toolchain only appends $CARGO_HOME/bin to
      # $GITHUB_PATH when it has to install rustup itself; rustup was already
      # present here, so it skipped that. Prepending the rustup-managed
      # proxy directory restores the expected `cargo` lookup.
      - name: Put rustup-managed cargo first on PATH
        run: echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      # PATH-prepend alone is not enough on the current macos runner image —
      # the Homebrew shim at /opt/homebrew/bin/cargo keeps winning for some
      # step invocations (PR #65 run 25891917328: `cargo check → unexpected
      # argument 'check' found` from rustup-init). Physically replace each
      # known shim path with a symlink to the rustup-managed binary so PATH
      # ordering doesn't matter. Identical step to release.yml — keep the
      # two in sync. See release.yml for the longer rationale.
      - name: Replace Homebrew cargo shim with rustup-managed cargo
        run: |
          set -euo pipefail
          rustup_cargo="$HOME/.cargo/bin/cargo"
          if [ ! -x "$rustup_cargo" ]; then
            echo "::error::rustup-managed cargo not found at $rustup_cargo — toolchain step failed?"
            exit 1
          fi
          replaced=0
          for shim in /opt/homebrew/bin/cargo /usr/local/bin/cargo; do
            if [ -e "$shim" ] || [ -L "$shim" ]; then
              sudo rm -f "$shim"
              sudo ln -sf "$rustup_cargo" "$shim"
              echo "Replaced shim: $shim → $rustup_cargo"
              replaced=$((replaced + 1))
            fi
          done
          if [ "$replaced" = 0 ]; then
            echo "No Homebrew cargo shims found at /opt/homebrew/bin or /usr/local/bin."
          fi
          for shim in /opt/homebrew/bin/cargo /usr/local/bin/cargo; do
            if [ -x "$shim" ]; then
              "$shim" --version
              "$shim" metadata --no-deps --format-version 1 --manifest-path src-tauri/Cargo.toml >/dev/null
            fi
          done

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"
      - run: cargo check
        working-directory: src-tauri
      - run: cargo fmt --check
        working-directory: src-tauri
      - run: cargo clippy --all-targets -- -D warnings
        working-directory: src-tauri
      - run: cargo test
        working-directory: src-tauri
