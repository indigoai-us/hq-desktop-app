name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  frontend-macos:
    name: Frontend (typecheck + lint + test)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm test
      - run: pnpm coverage
      - name: Coverage summary
        run: |
          node <<'NODE' >> "$GITHUB_STEP_SUMMARY"
          const { readFileSync } = require("node:fs");
          const summary = JSON.parse(readFileSync("coverage/coverage-summary.json", "utf8")).total;
          console.log("## Coverage summary");
          console.log("");
          console.log("| Metric | % | Covered | Total |");
          console.log("| --- | ---: | ---: | ---: |");
          for (const metric of ["lines", "statements", "functions", "branches"]) {
            const item = summary[metric];
            console.log(`| ${metric} | ${item.pct} | ${item.covered} | ${item.total} |`);
          }
          NODE
      - run: pnpm exec vitest run --dir scripts --environment node

  e2e:
    name: E2E (Playwright)
    runs-on: macos-latest
    needs: [frontend-macos]
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec playwright install chromium --with-deps
      - run: pnpm e2e
        env:
          VITE_COGNITO_USER_POOL_ID: us-east-1_TESTPOOL
          VITE_COGNITO_CLIENT_ID: test-client-id
          VITE_COGNITO_DOMAIN: https://mock-cognito.auth.us-east-1.amazoncognito.com

  rust-macos:
    name: Rust (fmt + check + clippy + test)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      # macos-15-arm64 image 20260511.0048.1 ships a Homebrew `cargo` shim
      # that resolves to `rustup-init` and shadows ~/.cargo/bin/cargo on
      # $PATH. dtolnay/rust-toolchain only appends $CARGO_HOME/bin to
      # $GITHUB_PATH when it has to install rustup itself; rustup was already
      # present here, so it skipped that. Prepending the rustup-managed
      # proxy directory restores the expected `cargo` lookup.
      - name: Put rustup-managed cargo first on PATH
        run: echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      # PATH-prepend alone is not enough — the rogue cargo-shim that maps to
      # rustup-init lives at an enumeration-resistant path on macos-latest
      # (PR #65 run 25892054324 reproduced the original `cargo check →
      # unexpected argument 'check' found` even though /opt/homebrew/bin/cargo
      # and /usr/local/bin/cargo were both absent). Walk EVERY `cargo` on PATH
      # via `which -a` and replace any entry that isn't already the rustup-
      # managed binary (or a symlink to it) with a symlink to it. Identical
      # step to release.yml — keep the two in sync.
      - name: Replace any cargo shim with rustup-managed cargo
        run: |
          set -euo pipefail
          rustup_cargo="$HOME/.cargo/bin/cargo"
          if [ ! -x "$rustup_cargo" ]; then
            echo "::error::rustup-managed cargo not found at $rustup_cargo — toolchain step failed?"
            exit 1
          fi

          # Diagnostics — useful if a future image moves cargo somewhere new.
          echo "PATH=$PATH"
          echo "All cargo on PATH:"
          which -a cargo || true

          replaced=0
          # `which -a` enumerates every cargo on PATH in resolution order.
          # We rewrite every non-rustup entry to point at rustup-managed
          # cargo so it doesn't matter which one the resolver picks.
          while IFS= read -r c; do
            [ -n "$c" ] || continue
            # Already the real rustup-managed binary? Skip.
            if [ "$c" = "$rustup_cargo" ]; then
              continue
            fi
            # Already a symlink pointing at rustup-managed? Skip.
            target="$(readlink "$c" 2>/dev/null || true)"
            if [ "$target" = "$rustup_cargo" ]; then
              continue
            fi
            echo "Replace shim: $c (was → '${target:-<regular file>}') → $rustup_cargo"
            sudo rm -f "$c"
            sudo ln -sf "$rustup_cargo" "$c"
            replaced=$((replaced + 1))
          done < <(which -a cargo 2>/dev/null || true)

          if [ "$replaced" = 0 ]; then
            echo "No non-rustup cargo entries on PATH (older image, or future fix landed)."
          fi

          # Sanity: every cargo on PATH should now route to rustup-managed.
          # `cargo metadata` exercises the same dispatch tauri-action's
          # child_process performs, so any remaining shim fails here loud
          # rather than 10 min into the Tauri build.
          which cargo
          cargo --version
          cargo metadata --no-deps --format-version 1 --manifest-path src-tauri/Cargo.toml >/dev/null

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"
      - run: cargo check
        working-directory: src-tauri
      - run: cargo fmt --check
        working-directory: src-tauri
      - run: cargo clippy --all-targets -- -D warnings
        working-directory: src-tauri
      - run: cargo test
        working-directory: src-tauri

  frontend-windows:
    name: Frontend (typecheck + lint + test) — Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm test
      - run: pnpm exec vitest run --dir scripts --environment node

  rust-windows:
    name: Rust (fmt + check + clippy + test) — Windows (${{ matrix.target }})
    runs-on: windows-latest
    needs: [frontend-windows]
    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64-pc-windows-msvc
          - aarch64-pc-windows-msvc
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
          components: rustfmt, clippy

      # windows-latest already ships VS Build Tools 2022, the Windows SDK,
      # and a working MSVC link.exe — no extra setup needed for cargo.
      # `cargo` and `rustc` from rustup are first on PATH.

      - name: cargo fmt --check
        if: matrix.target == 'x86_64-pc-windows-msvc'
        working-directory: src-tauri
        run: cargo fmt --check

      - name: cargo clippy
        if: matrix.target == 'x86_64-pc-windows-msvc'
        working-directory: src-tauri
        run: cargo clippy --all-targets -- -D warnings

      - name: cargo test
        if: matrix.target == 'x86_64-pc-windows-msvc'
        working-directory: src-tauri
        run: cargo test --release

      - name: cargo check (${{ matrix.target }})
        working-directory: src-tauri
        run: cargo check --target ${{ matrix.target }}

  build-smoke-windows:
    name: Tauri build smoke (x64 MSI/NSIS, no signing)
    runs-on: windows-latest
    needs: [frontend-windows, rust-windows]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - run: pnpm install --frozen-lockfile

      # Smoke build only — verifies the WiX + NSIS bundlers complete and
      # produce both .msi and .exe artifacts. The base config sets
      # bundle.createUpdaterArtifacts=true, which makes Tauri v2 HARD-FAIL the
      # build when TAURI_SIGNING_PRIVATE_KEY is absent (it's an error, not a
      # warning). The smoke build doesn't need updater artifacts, so we merge
      # tauri.smoke.conf.json to flip createUpdaterArtifacts=false — bundles
      # still emit, no signing key required. Full signed-updater + Azure signing
      # flow lives in release.yml.
      - name: Tauri build (x64)
        run: pnpm tauri build --target x86_64-pc-windows-msvc --bundles msi,nsis --config src-tauri/tauri.smoke.conf.json
        env:
          # Force unsigned smoke build — full Azure signing flow lives in release.yml
          CI: "true"

      - name: Verify MSI + NSIS artifacts exist
        shell: pwsh
        run: |
          $msi = Get-ChildItem -Path src-tauri\target\x86_64-pc-windows-msvc\release\bundle\msi -Filter '*.msi' -ErrorAction SilentlyContinue
          if (-not $msi) { Write-Error "No .msi found in bundle/msi"; exit 1 }
          $nsis = Get-ChildItem -Path src-tauri\target\x86_64-pc-windows-msvc\release\bundle\nsis -Filter '*-setup.exe' -ErrorAction SilentlyContinue
          if (-not $nsis) { Write-Error "No NSIS -setup.exe found in bundle/nsis"; exit 1 }
          Write-Host "OK: $($msi.Name) + $($nsis.Name)"
