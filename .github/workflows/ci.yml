name: CI

# Test + lint gate for the unified app, restoring the coverage the three source
# repos ran on every PR (hq-installer / hq-sync / hq-sync-win). Mirrors
# hq-sync's ci.yml (typecheck + lint + build + coverage on the frontend, Rust
# unit tests on macOS) and its desktop-alt-e2e.yml.
#
# Blocking gates:
#   - frontend: typecheck (svelte-check), lint (svelte-check --threshold error),
#     build, and vitest-with-coverage.
#   - rust-macos: Rust unit tests for the app crate AND the workspace crates
#     (macOS = the shipping platform).
# Also blocking:
#   - e2e-desktop-alt: the desktop-alt source-contract suite (mirrors hq-sync's
#     desktop-alt-e2e.yml). Windows compile stays in windows-check.yml.
# Non-blocking (continue-on-error) informational steps, flipping to required
# after a dedicated cleanup pass:
#   - cargo fmt --check + cargo clippy -D warnings (the app carries ~110
#     pre-existing clippy warnings, incl. several await-holding-lock sites).

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  frontend:
    name: Frontend (typecheck + lint + coverage)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      # pnpm version is read from the root package.json "packageManager" field;
      # passing an explicit version here is rejected as a conflict.
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --no-frozen-lockfile
      - name: Typecheck (svelte-check)
        working-directory: apps/sync
        run: pnpm typecheck
      - name: Lint (svelte-check --threshold error)
        working-directory: apps/sync
        run: pnpm lint
      - name: Build
        working-directory: apps/sync
        env:
          SENTRY_AUTH_TOKEN: ""
          VITE_SENTRY_DSN: ""
        run: pnpm build
      - name: Vitest + coverage
        working-directory: apps/sync
        run: pnpm coverage
      - name: Coverage summary
        if: always()
        working-directory: apps/sync
        run: |
          {
            echo "## Coverage"
            if [ -f coverage/coverage-summary.json ]; then
              node -e "const c=require('./coverage/coverage-summary.json').total; for (const k of ['lines','statements','functions','branches']) console.log('- '+k+': '+c[k].pct+'%')"
            else
              echo "_(no coverage/coverage-summary.json produced)_"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

  rust-macos:
    name: Rust tests (macOS)
    runs-on: macos-latest
    timeout-minutes: 30
    env:
      RUST_BACKTRACE: 1
      HQ_SYNC_SENTRY_DSN: ""
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --no-frozen-lockfile
      # build.rs validates the bundled `resources` paths in tauri.conf.json —
      # including the Recall sidecar's node_modules, which only exists after the
      # sidecar install. Without it `cargo test` fails the build script.
      - name: Install Recall sidecar deps (bundled resource)
        working-directory: apps/sync
        run: pnpm run sidecar:install
      # tauri's `generate_context!` embeds the frontend dist at compile time, so
      # the Svelte bundle must exist before the app crate will build for tests.
      - name: Build Svelte bundle (satisfies tauri frontendDist)
        working-directory: apps/sync
        env:
          SENTRY_AUTH_TOKEN: ""
          VITE_SENTRY_DSN: ""
        run: pnpm build
      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin
          components: rustfmt, clippy
      - uses: swatinem/rust-cache@v2
        with:
          workspaces: |
            .
            apps/sync/src-tauri
      - name: Workspace crate tests (hq-desktop-core, hq-platform, hq-telemetry)
        run: cargo test --workspace
      - name: App crate tests (hq-sync-menubar)
        working-directory: apps/sync/src-tauri
        run: cargo test
      # ── Non-blocking style gates (flip to required after the cleanup pass) ──
      - name: cargo fmt --check (non-blocking)
        continue-on-error: true
        working-directory: apps/sync/src-tauri
        run: cargo fmt --check
      - name: cargo clippy (non-blocking)
        continue-on-error: true
        working-directory: apps/sync/src-tauri
        run: cargo clippy --all-targets -- -D warnings

  e2e-desktop-alt:
    name: Desktop-alt E2E
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --no-frozen-lockfile
      # BLOCKING: the desktop-alt source-contract suite (42 files / 221 tests) is
      # green. The parity items it once flagged are resolved — the recall
      # recording-tracker.mjs is bundled on every platform (#91), and the
      # Files-mode lister (list_dir_entries + DirEntry), the project-status path
      # guard + atomic write, and the metadata-only SecretItem projection are all
      # implemented AND unit-tested in the hq-desktop-core library, with the
      # specs asserting that shared-crate location (the command binary can't own
      # those definitions — the library it depends on does).
      - name: Desktop-alt E2E
        working-directory: apps/sync
        run: pnpm test:e2e:desktop-alt
