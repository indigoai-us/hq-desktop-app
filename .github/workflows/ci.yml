name: CI

# Test + lint gate for the unified app, restoring the coverage the three source
# repos ran on every PR (hq-installer / hq-sync / hq-sync-win). Before this the
# only PR check was `windows-check.yml` (a Windows *compile* check) — so neither
# the Rust test suite nor the frontend vitest suite ran in CI, and a broken test
# could merge unnoticed.
#
# Blocking gates: frontend vitest, Rust unit tests (macOS — the shipping
# platform) for both the app crate and the workspace crates. `cargo fmt` and
# `cargo clippy` run as non-blocking (continue-on-error) informational steps for
# now; the app carries ~110 pre-existing clippy warnings (incl. several
# await-holding-lock sites that need care) and some unformatted files. They flip
# to required after a dedicated cleanup pass. Windows compile stays in
# `windows-check.yml`.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  frontend:
    name: Frontend (vitest)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      # pnpm version is read from the root package.json "packageManager" field;
      # passing an explicit version here is rejected as a conflict.
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --no-frozen-lockfile
      - name: Vitest (apps/sync)
        working-directory: apps/sync
        run: pnpm test
      # Informational until the type surface is clean; not a merge gate yet.
      - name: Typecheck (non-blocking)
        continue-on-error: true
        working-directory: apps/sync
        run: pnpm typecheck

  rust-macos:
    name: Rust tests (macOS)
    runs-on: macos-latest
    timeout-minutes: 30
    env:
      RUST_BACKTRACE: 1
      HQ_SYNC_SENTRY_DSN: ""
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --no-frozen-lockfile
      # build.rs validates the bundled `resources` paths in tauri.conf.json —
      # including the Recall sidecar's node_modules, which only exists after the
      # sidecar install. Without it `cargo test` fails the build script.
      - name: Install Recall sidecar deps (bundled resource)
        working-directory: apps/sync
        run: pnpm run sidecar:install
      # tauri's `generate_context!` embeds the frontend dist at compile time, so
      # the Svelte bundle must exist before the app crate will build for tests.
      - name: Build Svelte bundle (satisfies tauri frontendDist)
        working-directory: apps/sync
        env:
          SENTRY_AUTH_TOKEN: ""
          VITE_SENTRY_DSN: ""
        run: pnpm build
      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin
          components: rustfmt, clippy
      - uses: swatinem/rust-cache@v2
        with:
          workspaces: |
            .
            apps/sync/src-tauri
      - name: Workspace crate tests (hq-desktop-core, hq-platform, hq-telemetry)
        run: cargo test --workspace
      - name: App crate tests (hq-sync-menubar)
        working-directory: apps/sync/src-tauri
        run: cargo test
      # ── Non-blocking style gates (flip to required after the cleanup pass) ──
      - name: cargo fmt --check (non-blocking)
        continue-on-error: true
        working-directory: apps/sync/src-tauri
        run: cargo fmt --check
      - name: cargo clippy (non-blocking)
        continue-on-error: true
        working-directory: apps/sync/src-tauri
        run: cargo clippy --all-targets -- -D warnings
