# Windows compile gate for the unified sync app (Phase 3 of MIGRATION.md).
#
# Cross-compiling a Tauri app for Windows cannot be verified on a macOS dev box
# (the per-target Recall sidecar binary and the MSVC toolchain are absent), so
# this is the authoritative feedback loop for the `cfg(target_os = "windows")`
# platform graft. It is EXPECTED TO BE RED until the platform-seam port in
# PHASE3.md is complete; it becomes a required check once green.
#
# Triggers on PRs that touch the app (not push to main) so main is not shown red
# while the fold is in progress; also manually dispatchable.
name: Windows check (Phase 3)

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "apps/sync/**"
      - "imports/hq-installer-react/**"
      - "crates/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/windows-check.yml"

jobs:
  windows-check:
    name: cargo check (x86_64-pc-windows-msvc)
    runs-on: windows-latest
    defaults:
      run:
        working-directory: apps/sync
    env:
      RUST_BACKTRACE: 1
      HQ_SYNC_SENTRY_DSN: ""

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      # Version comes from the root package.json "packageManager" field;
      # passing an explicit version here too is rejected as a conflict.
      - uses: pnpm/action-setup@v4

      - name: Install Rust (stable, x86_64-pc-windows-msvc)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc
          components: rustfmt, clippy

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            apps/sync/src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('apps/sync/src-tauri/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Install JS deps
        run: pnpm install --no-frozen-lockfile

      - name: Install Recall sidecar deps (build.rs resource)
        run: pnpm run sidecar:install

      - name: Build Svelte bundle (satisfies tauri frontendDist)
        run: pnpm run build

      - name: Rust check (Windows target)
        working-directory: apps/sync/src-tauri
        run: cargo check --target x86_64-pc-windows-msvc

      - name: Windows tests
        working-directory: apps/sync/src-tauri
        run: |
          cargo test --target x86_64-pc-windows-msvc --bins
          cargo test --manifest-path ../../../crates/hq-desktop-core/Cargo.toml paths::tests::test_windows
          cargo test --manifest-path ../../../crates/hq-desktop-core/Cargo.toml hq_resolver::tests

      - name: Install Tauri WebDriver bridge
        run: cargo install tauri-driver --locked

      - name: Verify Microsoft Edge WebDriver
        shell: pwsh
        run: |
          $driver = Get-Command msedgedriver.exe -ErrorAction Stop
          Write-Host "Using $($driver.Source)"

      - name: Build launchable Windows app
        run: pnpm tauri build --debug --no-bundle --target x86_64-pc-windows-msvc --config src-tauri/tauri.windows.conf.json

      - name: Live Windows desktop smoke test
        env:
          HQ_SYNC_DESKTOP_ALT_LIVE: "1"
          HQ_SYNC_DESKTOP_ALT_APP: ${{ github.workspace }}\apps\sync\src-tauri\target\x86_64-pc-windows-msvc\debug\hq-sync-menubar.exe
        run: pnpm vitest run --config e2e/desktop-alt/vitest.config.ts e2e/desktop-alt/smoke-pages.spec.ts

      # Enabled after the existing warning backlog is cleaned up:
      # - name: Clippy (deny warnings)
      #   working-directory: apps/sync/src-tauri
      #   run: cargo clippy --target x86_64-pc-windows-msvc -- -D warnings

  windows-installer-e2e:
    name: installer E2E (x64 NSIS)
    runs-on: windows-latest
    timeout-minutes: 45
    defaults:
      run:
        working-directory: apps/sync
    env:
      RUST_BACKTRACE: 1
      HQ_SYNC_SENTRY_DSN: ""
      RECALL_SIDECAR_TARGET: x86_64-pc-windows-msvc

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - uses: pnpm/action-setup@v4

      - name: Install Rust (stable, x86_64-pc-windows-msvc)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            apps/sync/src-tauri/target
          key: ${{ runner.os }}-installer-cargo-${{ hashFiles('apps/sync/src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-installer-cargo-
            ${{ runner.os }}-cargo-

      - name: Install JS deps
        run: pnpm install --no-frozen-lockfile

      - name: Install Recall sidecar deps
        run: pnpm run sidecar:install

      - name: Install Tauri WebDriver bridge
        run: cargo install tauri-driver --locked

      - name: Verify Microsoft Edge WebDriver
        shell: pwsh
        run: |
          $driver = Get-Command msedgedriver.exe -ErrorAction Stop
          Write-Host "Using $($driver.Source)"

      - name: Build production NSIS installer
        run: >-
          pnpm tauri build
          --target x86_64-pc-windows-msvc
          --bundles nsis
          --config src-tauri/tauri.windows.conf.json
          --config src-tauri/tauri.windows.release.conf.json
          --config src-tauri/tauri.windows.ci.conf.json

      - name: Install production package
        id: install
        shell: pwsh
        run: |
          $installer = Get-ChildItem "src-tauri\target\x86_64-pc-windows-msvc\release\bundle\nsis" -Filter '*-setup.exe' -File -ErrorAction Stop | Select-Object -First 1
          if (-not $installer) {
            throw "NSIS installer was not produced"
          }

          $installDir = Join-Path $env:RUNNER_TEMP "hq-installer-e2e"
          $app = & "scripts\windows-installer-e2e.ps1" -Action install -InstallerPath $installer.FullName -InstallDir $installDir

          "HQ_SYNC_DESKTOP_ALT_APP=$app" | Out-File -FilePath $env:GITHUB_ENV -Append
          "HQ_INSTALL_DIR=$installDir" | Out-File -FilePath $env:GITHUB_ENV -Append
          Write-Host "Installed application: $app"

      - name: Live smoke test installed application
        env:
          HQ_SYNC_DESKTOP_ALT_LIVE: "1"
        run: pnpm vitest run --config e2e/desktop-alt/vitest.config.ts e2e/desktop-alt/smoke-pages.spec.ts

      - name: Uninstall production package
        if: always() && steps.install.outcome == 'success'
        shell: pwsh
        run: |
          & "scripts\windows-installer-e2e.ps1" -Action uninstall -InstallDir $env:HQ_INSTALL_DIR

      - name: Upload application logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer-e2e-logs
          if-no-files-found: warn
          path: |
            ~/.hq/logs/**
            ${{ runner.temp }}/hq-installer-e2e/**
