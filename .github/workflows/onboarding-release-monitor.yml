name: Onboarding release monitor

on:
  schedule:
    - cron: "17 */6 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  smoke:
    name: Onboarding and public release smoke
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Verify final-step onboarding contract
        working-directory: apps/sync
        run: >-
          pnpm exec vitest run
          src/components/onboarding/OnboardingWizard.test.ts
          src/lib/onboarding-wizard.test.ts
      - name: Verify published updater and installer links
        run: pnpm exec tsx scripts/onboarding-release-monitor.ts
