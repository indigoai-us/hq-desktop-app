name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.1.0). If empty, uses the current commit."
        required: false
        type: string
      allow_unsigned:
        description: "Allow unsigned Windows installers for a manual dispatch only. Never set for production releases."
        required: false
        default: false
        type: boolean

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  release:
    name: Build & Release (macOS universal)
    runs-on: macos-latest
    timeout-minutes: 60
    permissions:
      contents: write
    steps:
      - name: Validate tag format
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Tag must match vX.Y.Z format, got: $TAG"
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}
          fetch-depth: 0

      - name: Validate release version files
        env:
          TAG: ${{ github.event.inputs.tag || github.ref_name }}
        run: |
          set -euo pipefail
          node --input-type=module <<'NODE'
          import fs from "node:fs";

          const tag = process.env.TAG;
          const version = tag.startsWith("v") ? tag.slice(1) : tag;

          const packageVersion = JSON.parse(fs.readFileSync("package.json", "utf8")).version;
          const tauriVersion = JSON.parse(fs.readFileSync("src-tauri/tauri.conf.json", "utf8")).version;

          const cargoToml = fs.readFileSync("src-tauri/Cargo.toml", "utf8");
          const cargoTomlMatch = cargoToml.match(/^\[package\][\s\S]*?^version\s*=\s*"([^"]+)"/m);
          if (!cargoTomlMatch) {
            console.error("::error file=src-tauri/Cargo.toml::Could not find package version");
            process.exit(1);
          }

          const cargoLock = fs.readFileSync("src-tauri/Cargo.lock", "utf8");
          const cargoLockMatch = cargoLock.match(/^\[\[package\]\]\nname = "hq-installer"\nversion = "([^"]+)"/m);
          if (!cargoLockMatch) {
            console.error("::error file=src-tauri/Cargo.lock::Could not find hq-installer package entry");
            process.exit(1);
          }

          const checks = [
            ["package.json", packageVersion],
            ["src-tauri/tauri.conf.json", tauriVersion],
            ["src-tauri/Cargo.toml", cargoTomlMatch[1]],
            ["src-tauri/Cargo.lock", cargoLockMatch[1]],
          ];
          const mismatches = checks.filter(([, actual]) => actual !== version);
          if (mismatches.length > 0) {
            for (const [file, actual] of mismatches) {
              console.error(`::error file=${file}::Release tag ${tag} expects version ${version}, found ${actual}`);
            }
            process.exit(1);
          }
          console.log(`Release version ${version} matches package.json, tauri.conf.json, Cargo.toml, and Cargo.lock`);
          NODE

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      # macos-15-arm64 image 20260511.0048.1 ships a Homebrew `cargo` shim
      # that resolves to `rustup-init` and shadows ~/.cargo/bin/cargo. Prepend
      # the rustup-managed proxy dir so tauri-action's cargo invocations
      # resolve correctly. See ci.yml for the full diagnosis.
      - name: Put rustup-managed cargo first on PATH
        run: echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      # PATH-prepend alone wasn't enough for the release flow: v0.4.0's
      # build (run 25890757341) hit `cargo metadata → unexpected argument
      # 'metadata' found` from `rustup-init`. tauri-action is a JS Action
      # that spawns `cargo` via Node `child_process`, so even with the
      # right PATH ordering it can resolve to a shim cargo at a path we
      # haven't enumerated. (PR #65 run 25892054324 reproduced this even
      # though /opt/homebrew/bin/cargo and /usr/local/bin/cargo were both
      # absent — the shim lives somewhere else on this image.)
      #
      # Walk EVERY `cargo` on PATH via `which -a` and replace any entry
      # that isn't already the rustup-managed binary (or a symlink to it)
      # with a symlink to it. After this step, every PATH-resolved cargo
      # invocation lands at the rustup-managed binary regardless of which
      # path the resolver picks. Identical step to ci.yml — keep the two
      # in sync.
      - name: Replace any cargo shim with rustup-managed cargo
        run: |
          set -euo pipefail
          rustup_cargo="$HOME/.cargo/bin/cargo"
          if [ ! -x "$rustup_cargo" ]; then
            echo "::error::rustup-managed cargo not found at $rustup_cargo — toolchain step failed?"
            exit 1
          fi

          # Diagnostics — useful if a future image moves cargo somewhere new.
          echo "PATH=$PATH"
          echo "All cargo on PATH:"
          which -a cargo || true

          replaced=0
          while IFS= read -r c; do
            [ -n "$c" ] || continue
            if [ "$c" = "$rustup_cargo" ]; then
              continue
            fi
            target="$(readlink "$c" 2>/dev/null || true)"
            if [ "$target" = "$rustup_cargo" ]; then
              continue
            fi
            echo "Replace shim: $c (was → '${target:-<regular file>}') → $rustup_cargo"
            sudo rm -f "$c"
            sudo ln -sf "$rustup_cargo" "$c"
            replaced=$((replaced + 1))
          done < <(which -a cargo 2>/dev/null || true)

          if [ "$replaced" = 0 ]; then
            echo "No non-rustup cargo entries on PATH (older image, or future fix landed)."
          fi

          # Sanity: invoke `cargo metadata` to mimic tauri-action's JS
          # child_process. Any remaining shim fails here loud rather than
          # 10 min into the Tauri build.
          which cargo
          cargo --version
          cargo metadata --no-deps --format-version 1 --manifest-path src-tauri/Cargo.toml >/dev/null

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"

      # Signing + notarization uses the same Apple Developer identity as
      # hq-sync and the indigo-nx Electron app. Secret-name mapping:
      #
      #   indigo-nx (CSC_LINK, CSC_KEY_PASSWORD, Apple ID app-specific
      #              password, ASC_PROVIDER)
      #   → hq-installer / hq-sync (APPLE_CERTIFICATE, APPLE_CERTIFICATE_PASSWORD,
      #                             APPLE_ID, APPLE_PASSWORD, APPLE_TEAM_ID)
      #
      # tauri-action reads these env vars natively:
      #   - APPLE_CERTIFICATE / APPLE_CERTIFICATE_PASSWORD — imports the .p12
      #     into a temporary keychain automatically; no manual `security
      #     import` step needed.
      #   - APPLE_ID / APPLE_PASSWORD / APPLE_TEAM_ID — notarytool submits
      #     the signed bundle to Apple using an app-specific password
      #     (same method electron-builder uses on indigo-nx).
      - name: Build, sign, and notarize universal .app
        uses: tauri-apps/tauri-action@v0
        id: tauri
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Vite inlines `import.meta.env.VITE_*` at build time. Without these
          # the shipped .app throws "VITE_COGNITO_CLIENT_ID is not set" on the
          # sign-in screen. CI already sets mocks for e2e; release needs the
          # real hq-pro Cognito values.
          VITE_COGNITO_USER_POOL_ID: ${{ secrets.VITE_COGNITO_USER_POOL_ID }}
          VITE_COGNITO_CLIENT_ID: ${{ secrets.VITE_COGNITO_CLIENT_ID }}
          VITE_COGNITO_DOMAIN: ${{ secrets.VITE_COGNITO_DOMAIN }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: "Developer ID Application"
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          # build.rs reads this via env!("SENTRY_DSN") — must be present at compile time
          # so the signed binary has a wired DSN rather than the empty-string no-op path.
          HQ_INSTALLER_SENTRY_DSN: ${{ secrets.HQ_INSTALLER_SENTRY_DSN }}
          # Webview (React) Sentry integration. VITE_SENTRY_DSN is inlined by Vite at
          # build time; the other three vars are consumed by @sentry/vite-plugin to
          # upload JS source maps to the hq-installer-web Sentry project during build.
          VITE_SENTRY_DSN: ${{ secrets.VITE_HQ_INSTALLER_WEB_SENTRY_DSN }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: indigo-d0
          SENTRY_PROJECT: hq-installer-web
        with:
          tagName: ${{ github.event.inputs.tag || github.ref_name }}
          releaseName: "HQ Installer ${{ github.event.inputs.tag || github.ref_name }}"
          releaseBody: "Download the .zip below, double-click the extracted app to run the installer. First time? See README for prerequisites."
          releaseDraft: true
          prerelease: false
          args: --target universal-apple-darwin

      # Sentry symbol upload is best-effort — it should never gate a release.
      # tauri-action's universal-apple-darwin build doesn't reliably emit
      # .dSYM bundles in the per-arch target dirs we search, so the prior
      # exit-1-on-zero-uploaded behavior wedged v0.1.24 with assets uploaded
      # but the publish step skipped. Step is allowed to fail loudly — the
      # signed/notarized binary and .zip alias still ship.
      - name: Create Sentry release and upload Rust debug symbols
        continue-on-error: true
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
        run: |
          INSTALL_DIR="$RUNNER_TEMP/bin"
          mkdir -p "$INSTALL_DIR"
          curl -sL "https://sentry.io/get-cli/" | INSTALL_DIR="$INSTALL_DIR" INSTALL_VERSION=2.41.1 sh
          export PATH="$INSTALL_DIR:$PATH"

          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          VERSION="${TAG#v}"
          RELEASE="hq-installer@${VERSION}"

          UPLOADED=0
          for TARGET_DIR in \
            src-tauri/target/universal-apple-darwin \
            src-tauri/target/aarch64-apple-darwin \
            src-tauri/target/x86_64-apple-darwin; do
            if [ -d "$TARGET_DIR" ]; then
              while read -r dsym; do
                sentry-cli debug-files upload \
                  --org indigo-d0 --project hq-installer \
                  --include-sources --wait "$dsym"
                UPLOADED=$((UPLOADED + 1))
              done < <(find "$TARGET_DIR" -name "*.dSYM" -type d)
            fi
          done
          if [ "$UPLOADED" -eq 0 ]; then
            echo "::error::No .dSYM bundles found in any target tree — symbolication will be broken"
            exit 1
          fi
          echo "Uploaded $UPLOADED dSYM bundle(s)"

          sentry-cli releases new "$RELEASE" --org indigo-d0 --project hq-installer
          sentry-cli releases set-commits "$RELEASE" --auto --org indigo-d0 --project hq-installer
          sentry-cli releases finalize "$RELEASE" --org indigo-d0 --project hq-installer

      # Versionless .zip alias. A zipped copy of the same signed/notarized
      # .app uploaded under a stable filename gives consumers a permanent
      # one-click URL:
      #   https://github.com/indigoai-us/hq-installer/releases/latest/download/hq-installer_universal.zip
      # GitHub auto-redirects /releases/latest/download/<name> to whatever
      # the current release is. Used by hq-onboarding's "Download HQ
      # Installer" step — no API call, no rate limit, one click forever.
      #
      # Shipping a zipped .app instead of a .dmg means Safari auto-extracts
      # the download and the user double-clicks the .app to run — no
      # mount-and-drag-to-Applications step. Gatekeeper accepts the notarized
      # .app out of a .zip the same way it accepts one out of a .dmg.
      #
      # Using `ditto --keepParent -c -k --sequesterRsrc` (Apple's recommended
      # archiver for signed bundles) preserves extended attributes, symlinks,
      # and the notarization stapler ticket that xattr-lossy zip tools like
      # `zip -r` would strip, which would re-trigger Gatekeeper on first
      # launch. --sequesterRsrc keeps resource forks inside __MACOSX so the
      # archive extracts cleanly on any macOS version.
      - name: Upload versionless .zip alias
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          APP_PATH=$(find src-tauri/target/universal-apple-darwin/release/bundle/macos -maxdepth 1 -name "*.app" | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "::error::No .app bundle found — cannot build .zip alias"
            exit 1
          fi
          ALIAS_PATH="src-tauri/target/hq-installer_universal.zip"
          ditto -c -k --keepParent --sequesterRsrc "$APP_PATH" "$ALIAS_PATH"
          gh release upload "$TAG" "$ALIAS_PATH" --clobber

          # Versioned copy, matches the DMG's old naming convention for
          # anyone linking a specific release.
          VERSION="${TAG#v}"
          VERSIONED_PATH="src-tauri/target/hq-installer_${VERSION}_universal.zip"
          cp "$ALIAS_PATH" "$VERSIONED_PATH"
          gh release upload "$TAG" "$VERSIONED_PATH" --clobber

      # tauri-action creates the release as a draft. The finalize job is the
      # only job allowed to publish the draft, after both macOS and Windows
      # installer assets exist.

  build-windows:
    name: Build & Sign (${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64-pc-windows-msvc
          - aarch64-pc-windows-msvc
    runs-on: windows-latest
    timeout-minutes: 60
    permissions:
      contents: read
      id-token: write
    # Bind the job to the `release` environment so the GitHub OIDC token's
    # subject is `repo:indigoai-us/hq-installer:environment:release` — exactly
    # what the Azure federated credential on the signing app trusts. This
    # subject is stable across tag pushes AND workflow_dispatch (tags can't be
    # matched by a static federated credential subject, environments can).
    environment: release

    steps:
      - name: Validate tag format
        shell: pwsh
        run: |
          $tag = if ("${{ github.event.inputs.tag }}") { "${{ github.event.inputs.tag }}" } else { "${{ github.ref_name }}" }
          if ($tag -notmatch '^v\d+\.\d+\.\d+$') {
            Write-Error "Tag must match vX.Y.Z format, got: $tag"
            exit 1
          }

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}
          fetch-depth: 0

      - name: Preflight Windows signing configuration
        shell: pwsh
        env:
          AZURE_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
          AZURE_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
          AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
          ALLOW_UNSIGNED_WINDOWS: ${{ github.event_name == 'workflow_dispatch' && inputs.allow_unsigned == true }}
        run: |
          $missing = @()
          foreach ($name in @("AZURE_CLIENT_ID", "AZURE_TENANT_ID", "AZURE_SUBSCRIPTION_ID")) {
            if ([string]::IsNullOrWhiteSpace([Environment]::GetEnvironmentVariable($name))) {
              $missing += $name
            }
          }

          if ($missing.Count -eq 0) {
            Write-Host "Azure Trusted Signing configuration present."
            exit 0
          }

          if ($env:ALLOW_UNSIGNED_WINDOWS -eq "true") {
            Write-Warning "Unsigned Windows release explicitly allowed for this manual dispatch. Missing: $($missing -join ', ')"
            exit 0
          }

          Write-Error "Refusing to publish unsigned Windows installers. Missing repository variables: $($missing -join ', '). Configure Azure Trusted Signing or rerun a manual dispatch with allow_unsigned=true for a non-production exception."
          exit 1

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Tauri build (${{ matrix.target }})
        env:
          # Cognito config is inlined into the JS bundle by Vite at BUILD time
          # (import.meta.env.VITE_*). Without these the shipped installer
          # throws "VITE_COGNITO_CLIENT_ID is not set" on the sign-in screen —
          # see src/lib/cognito.ts + src/lib/google-oauth.ts. Same secret
          # names the macOS release workflow uses.
          VITE_COGNITO_USER_POOL_ID: ${{ secrets.VITE_COGNITO_USER_POOL_ID }}
          VITE_COGNITO_CLIENT_ID: ${{ secrets.VITE_COGNITO_CLIENT_ID }}
          VITE_COGNITO_DOMAIN: ${{ secrets.VITE_COGNITO_DOMAIN }}
          # Crash reporting. build.rs reads HQ_INSTALLER_SENTRY_DSN at compile
          # time and bakes it into env!("SENTRY_DSN") (src-tauri/src/lib.rs);
          # VITE_SENTRY_DSN is inlined for the React layer. SENTRY_* drive
          # @sentry/vite-plugin source-map upload.
          HQ_INSTALLER_SENTRY_DSN: ${{ secrets.HQ_INSTALLER_SENTRY_DSN }}
          VITE_SENTRY_DSN: ${{ secrets.VITE_HQ_INSTALLER_WEB_SENTRY_DSN }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: indigo-d0
          SENTRY_PROJECT: hq-installer-web
        run: pnpm tauri build --target ${{ matrix.target }} --bundles msi,nsis

      # -- Azure Trusted Signing (Artifact Signing) -------------------------
      # Authenticate to Azure via OIDC IMMEDIATELY before signing. A federated
      # login yields a ~1h az-CLI access token with NO refresh token, so we log
      # in post-build (not before) to guarantee the token is still valid when
      # signtool runs at the end of a long build. Normal releases fail in the
      # preflight above unless all Azure repo variables are present; unsigned
      # artifacts are allowed only for an explicit manual exception.
      - name: Azure login (OIDC)
        if: vars.AZURE_CLIENT_ID != '' && vars.AZURE_TENANT_ID != '' && vars.AZURE_SUBSCRIPTION_ID != ''
        uses: azure/login@v3
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      # Sign the MSI and the NSIS -setup.exe with the Indigo AI Trusted Signing
      # certificate profile. Two SCOPED, non-recursive passes (one per bundle
      # subdir) so we never re-sign the embedded MicrosoftEdgeWebview2Setup.exe
      # that `embedBootstrapper` packs into the bundle staging — re-signing
      # Microsoft's binary would replace their Authenticode signature with ours.
      # trusted-signing-action authenticates via the az-CLI credential
      # established above (its exclude-azure-cli-credential defaults to false).
      - name: Sign MSI (Azure Trusted Signing)
        if: vars.AZURE_CLIENT_ID != '' && vars.AZURE_TENANT_ID != '' && vars.AZURE_SUBSCRIPTION_ID != ''
        uses: azure/trusted-signing-action@v2.0.0
        with:
          endpoint: https://eus.codesigning.azure.net/
          signing-account-name: indigosigning
          certificate-profile-name: indigo-codesign
          files-folder: ${{ github.workspace }}\src-tauri\target\${{ matrix.target }}\release\bundle\msi
          files-folder-filter: msi
          files-folder-recurse: false
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      - name: Sign NSIS setup (Azure Trusted Signing)
        if: vars.AZURE_CLIENT_ID != '' && vars.AZURE_TENANT_ID != '' && vars.AZURE_SUBSCRIPTION_ID != ''
        uses: azure/trusted-signing-action@v2.0.0
        with:
          endpoint: https://eus.codesigning.azure.net/
          signing-account-name: indigosigning
          certificate-profile-name: indigo-codesign
          files-folder: ${{ github.workspace }}\src-tauri\target\${{ matrix.target }}\release\bundle\nsis
          files-folder-filter: exe
          files-folder-recurse: false
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      - name: Stage release artifacts
        shell: pwsh
        run: |
          $stage = Join-Path $env:GITHUB_WORKSPACE "release-artifacts-${{ matrix.target }}"
          New-Item -ItemType Directory -Path $stage -Force | Out-Null
          $bundleDir = "src-tauri\target\${{ matrix.target }}\release\bundle"
          Get-ChildItem -Path "$bundleDir\msi" -Recurse -Include '*.msi' -ErrorAction SilentlyContinue | Copy-Item -Destination $stage
          Get-ChildItem -Path "$bundleDir\nsis" -Recurse -Include '*-setup.exe' -ErrorAction SilentlyContinue | Copy-Item -Destination $stage
          Get-ChildItem -Path $stage | ForEach-Object { Write-Host "Staged: $($_.Name)" }

      - name: Verify staged Authenticode signatures
        if: vars.AZURE_CLIENT_ID != '' && vars.AZURE_TENANT_ID != '' && vars.AZURE_SUBSCRIPTION_ID != ''
        shell: pwsh
        run: |
          $stage = Join-Path $env:GITHUB_WORKSPACE "release-artifacts-${{ matrix.target }}"
          $targets = @()
          $targets += Get-ChildItem -Path $stage -Filter '*.msi' -File -ErrorAction SilentlyContinue
          $targets += Get-ChildItem -Path $stage -Filter '*.exe' -File -ErrorAction SilentlyContinue
          if (-not $targets) {
            Write-Error "No staged MSI or NSIS setup artifacts found for Authenticode verification"
            exit 1
          }

          foreach ($target in $targets) {
            $signature = Get-AuthenticodeSignature -FilePath $target.FullName
            if ($signature.Status -ne 'Valid') {
              Write-Error "Invalid Authenticode signature for $($target.Name): $($signature.Status) $($signature.StatusMessage)"
              exit 1
            }
            Write-Host "Valid Authenticode signature: $($target.Name)"
          }

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}
          path: release-artifacts-${{ matrix.target }}/

  publish-windows:
    name: Publish Windows release assets
    needs: [build-windows]
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts/

      - name: Flatten into a single dir
        shell: pwsh
        run: |
          $combined = Join-Path $env:GITHUB_WORKSPACE "release-final"
          New-Item -ItemType Directory -Path $combined -Force | Out-Null
          Get-ChildItem -Path release-artifacts -Recurse -File | Copy-Item -Destination $combined
          Get-ChildItem $combined | Format-Table Name, Length

      - name: Upload to macOS-created draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: pwsh
        run: |
          $tag = if ("${{ github.event.inputs.tag }}") { "${{ github.event.inputs.tag }}" } else { "${{ github.ref_name }}" }
          $files = Get-ChildItem release-final -File | ForEach-Object { $_.FullName }

          # The macOS tauri-action job is responsible for creating the draft
          # release. Windows only uploads assets into that same draft so the
          # finalizer can publish one cross-platform release after both
          # platform pipelines are complete.
          $found = $false
          for ($i = 1; $i -le 120; $i++) {
            gh release view "$tag" 2>$null | Out-Null
            if ($LASTEXITCODE -eq 0) {
              $found = $true
              break
            }
            Write-Host "Waiting for macOS draft release $tag to exist ($i/120)..."
            Start-Sleep -Seconds 30
          }
          if (-not $found) {
            Write-Error "Release $tag was not created by the macOS job"
            exit 1
          }

          gh release upload "$tag" $files --clobber

      # Versionless download aliases. The MSI/NSIS assets are version-stamped
      # (HQ Installer_0.4.1_x64-setup.exe), so there's no stable "latest" URL
      # for an onboarding/download page to link. Upload a copy under a fixed
      # name per arch so this resolves forever:
      #   .../releases/latest/download/HQ-Installer_x64-setup.exe
      - name: Upload versionless installer aliases
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: pwsh
        run: |
          $tag = if ("${{ github.event.inputs.tag }}") { "${{ github.event.inputs.tag }}" } else { "${{ github.ref_name }}" }
          foreach ($arch in @("x64", "arm64")) {
            $setup = Get-ChildItem release-final -Filter "*_${arch}-setup.exe" | Select-Object -First 1
            if (-not $setup) { Write-Warning "No NSIS setup .exe for $arch — skipping alias"; continue }
            $alias = Join-Path release-final "HQ-Installer_${arch}-setup.exe"
            Copy-Item $setup.FullName $alias -Force
            gh release upload "$tag" $alias --clobber
            Write-Host "Alias: HQ-Installer_${arch}-setup.exe -> $($setup.Name)"
          }

  finalize:
    name: Finalize release
    needs: [release, publish-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Verify release assets and publish draft
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.event.inputs.tag || github.ref_name }}
        run: |
          set -euo pipefail
          gh release view "$TAG" --json assets -q '.assets[].name' > assets.txt

          require_asset() {
            local label="$1"
            local pattern="$2"
            if ! grep -Eq "$pattern" assets.txt; then
              echo "::error::Missing required asset: $label"
              echo "Assets present:"
              cat assets.txt
              exit 1
            fi
          }

          # Nothing goes live until all platform installer assets are present
          # in the same draft release.
          require_asset "macOS versionless zip" '^hq-installer_universal\.zip$'
          require_asset "windows x64 setup" '_x64-setup\.exe$'
          require_asset "windows arm64 setup" '_arm64-setup\.exe$'
          require_asset "windows x64 versionless setup" '^HQ-Installer_x64-setup\.exe$'
          require_asset "windows arm64 versionless setup" '^HQ-Installer_arm64-setup\.exe$'

          gh release edit "$TAG" --draft=false
