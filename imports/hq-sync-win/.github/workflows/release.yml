name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.1.0)."
        required: false
        type: string

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: windows-latest
    timeout-minutes: 60

    # Surface the channel classification to the publish job. The value is
    # identical across matrix targets (it's derived from the tag), so
    # last-writer-wins is safe.
    outputs:
      is_prerelease: ${{ steps.classify.outputs.is_prerelease }}
      channel: ${{ steps.classify.outputs.channel }}

    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64-pc-windows-msvc
          - aarch64-pc-windows-msvc

    env:
      RUST_BACKTRACE: 1

    steps:
      - uses: actions/checkout@v4

      # Tag must be either:
      #   vX.Y.Z              → Stable channel
      #   vX.Y.Z-beta.N       → Beta channel (prerelease)
      #   vX.Y.Z-alpha.N      → Alpha channel (prerelease)
      #
      # Other pre-release patterns (`-rc.N`, `-pre`, `-dev`, raw `-beta`
      # without a number) are REJECTED at validation time so they can't
      # silently produce releases that the client-side resolver in
      # `util/release_channel.rs::parse_channel_from_tag` won't classify.
      # Strict here = typos fail fast in CI rather than producing a
      # published release that the auto-updater never advertises.
      #
      # `is_prerelease` is consumed by the publish job's softprops/action-gh-release
      # `prerelease:` input. The GitHub /releases/latest/ alias already filters to
      # non-prereleases, so flipping this is what keeps a stable-channel user's
      # static-endpoint poll from accidentally picking up a beta. Runs under bash
      # explicitly because the default shell on windows-latest is PowerShell.
      - name: Validate tag format + classify channel
        id: classify
        shell: bash
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          if [[ "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            CHANNEL="stable"
            IS_PRE="false"
          elif [[ "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+-beta\.[0-9]+$ ]]; then
            CHANNEL="beta"
            IS_PRE="true"
          elif [[ "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+-alpha\.[0-9]+$ ]]; then
            CHANNEL="alpha"
            IS_PRE="true"
          else
            echo "::error::Tag must match vX.Y.Z, vX.Y.Z-beta.N, or vX.Y.Z-alpha.N — got: $TAG"
            exit 1
          fi
          echo "channel=$CHANNEL" >> "$GITHUB_OUTPUT"
          echo "is_prerelease=$IS_PRE" >> "$GITHUB_OUTPUT"
          echo "Tag $TAG classified as channel=$CHANNEL prerelease=$IS_PRE"

      - name: Install Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Rust (stable, ${{ matrix.target }})
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ matrix.target }}-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-${{ matrix.target }}-

      - name: npm ci
        run: npm ci

      # Recall Desktop SDK sidecar (US-012). This installs the @recallai/desktop-sdk
      # Windows runtime (agent-windows.exe + FFmpeg/GStreamer DLLs, fetched by the
      # package's setup.js for process.platform==='win32') AND builds the
      # `recall-desktop-sdk-<triple>.exe` launcher — a self-contained Node SEA that
      # tauri.conf.json references via `bundle.externalBin`. Declaring externalBin
      # makes `tauri build` REQUIRE this binary to exist, so it MUST be produced
      # before the Tauri build step below. (tauri.conf.json's beforeBuildCommand
      # also calls build.mjs as a safety net; build.mjs is idempotent, so once this
      # step produces the launcher that later call is a no-op and won't re-strip the
      # Authenticode signature applied in "Sign Recall sidecar launcher".)
      #
      # RECALL_SIDECAR_TARGET tells build.mjs how to name the launcher to match the
      # Tauri externalBin target triple. NOTE: build.mjs copies the *host* node.exe
      # (x64 on windows-latest runners), so the aarch64 leg currently emits an x64
      # launcher under an aarch64 name — see docs/RELEASE.md "arm64 caveat".
      - name: Build Recall SDK sidecar (${{ matrix.target }})
        shell: pwsh
        env:
          RECALL_SIDECAR_TARGET: ${{ matrix.target }}
        run: |
          npm ci --prefix sidecar/recall-sdk-bridge
          node sidecar/recall-sdk-bridge/build.mjs
          if (-not (Test-Path "src-tauri/binaries/recall-desktop-sdk-${{ matrix.target }}.exe")) {
            throw "sidecar launcher was not produced for ${{ matrix.target }}"
          }

      - name: Decode signing certificate
        if: env.WINDOWS_SIGNING_CERT != ''
        shell: pwsh
        env:
          WINDOWS_SIGNING_CERT: ${{ secrets.WINDOWS_SIGNING_CERT }}
        run: |
          $bytes = [Convert]::FromBase64String($env:WINDOWS_SIGNING_CERT)
          $pfxPath = Join-Path $env:RUNNER_TEMP "hq-sync-win.pfx"
          [IO.File]::WriteAllBytes($pfxPath, $bytes)
          echo "PFX_PATH=$pfxPath" >> $env:GITHUB_ENV

      # Sign the sidecar launcher BEFORE `tauri build` embeds it into the MSI/NSIS
      # installer, so the copy that ships inside the installer is Authenticode-signed.
      # build.mjs is idempotent (it won't rebuild an existing launcher without
      # --force), so the beforeBuildCommand hook in the next step does not overwrite
      # this signature. Skipped cleanly on unsigned dogfood builds (PFX_PATH unset).
      - name: Sign Recall sidecar launcher (SignTool)
        if: env.PFX_PATH != ''
        shell: pwsh
        env:
          SIGNING_PASSWORD: ${{ secrets.WINDOWS_SIGNING_CERT_PASSWORD }}
        run: |
          $signtool = (Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin\*\x64\signtool.exe" |
                       Sort-Object FullName -Descending |
                       Select-Object -First 1).FullName
          if (-not $signtool) {
            throw "signtool.exe not found under Windows Kits"
          }
          $launcher = "src-tauri\binaries\recall-desktop-sdk-${{ matrix.target }}.exe"
          if (-not (Test-Path $launcher)) {
            throw "sidecar launcher missing — cannot sign: $launcher"
          }
          & $signtool sign /f $env:PFX_PATH /p $env:SIGNING_PASSWORD `
            /tr "http://timestamp.digicert.com" /td sha256 /fd sha256 `
            $launcher

      - name: Tauri build (${{ matrix.target }})
        env:
          # Updater signing — separate from the SignTool PFX.
          # TAURI_SIGNING_PRIVATE_KEY pairs with the pubkey in
          # tauri.conf.json plugins.updater.pubkey (see
          # scripts/generate-updater-keypair.ps1).
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # Sentry DSN — release-only secret. PR/CI builds have it empty
          # and the Sentry client no-ops.
          HQ_SYNC_SENTRY_DSN: ${{ secrets.HQ_SYNC_SENTRY_DSN }}
        run: npm run tauri build -- --target ${{ matrix.target }} --bundles msi nsis updater

      - name: Sign installers (SignTool)
        if: env.PFX_PATH != ''
        shell: pwsh
        env:
          SIGNING_PASSWORD: ${{ secrets.WINDOWS_SIGNING_CERT_PASSWORD }}
        run: |
          # Find the newest installed signtool.exe under the Windows SDK
          # bin dir on the runner.
          $signtool = (Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin\*\x64\signtool.exe" |
                       Sort-Object FullName -Descending |
                       Select-Object -First 1).FullName
          if (-not $signtool) {
            throw "signtool.exe not found under Windows Kits"
          }
          # Sign the produced installers (.msi / NSIS .exe). The sidecar launcher
          # was already signed pre-build (see "Sign Recall sidecar launcher"); the
          # recursive *.exe glob below also re-signs it and the Recall runtime
          # agent-windows.exe if Tauri staged resources as loose files under the
          # bundle dir. The Recall FFmpeg/GStreamer DLLs ship inside the runtime
          # as-is (Recall's own redistributables — not re-signed here; they carry
          # their own provenance, and on Windows there is no notary requiring a
          # per-Mach-O signature the way macOS does — see docs/RELEASE.md).
          $artifacts = Get-ChildItem -Recurse `
            -Path "src-tauri\target\${{ matrix.target }}\release\bundle" `
            -Include "*.msi","*.exe"
          foreach ($artifact in $artifacts) {
            & $signtool sign /f $env:PFX_PATH /p $env:SIGNING_PASSWORD `
              /tr "http://timestamp.digicert.com" /td sha256 /fd sha256 `
              $artifact.FullName
          }

      - name: Upload bundle artifacts
        uses: actions/upload-artifact@v4
        with:
          name: hq-sync-win-${{ matrix.target }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/msi/*.msi
            src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.exe
            src-tauri/target/${{ matrix.target }}/release/bundle/msi/*.zip
            src-tauri/target/${{ matrix.target }}/release/bundle/msi/*.sig

  release:
    name: Publish GitHub release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: Flatten artifact tree
        run: |
          set -e
          mkdir -p ./release
          find ./artifacts -type f -print0 | xargs -0 -I {} cp {} ./release/
          ls -la ./release

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: ./release/*
          fail_on_unmatched_files: false
          generate_release_notes: true
          # Channel-aware (US-012): beta/alpha tags publish as prereleases so
          # the /releases/latest/ alias skips them and stable-channel users
          # polling the static updater endpoint never pick them up. The
          # client-side tag-suffix filter in util/release_channel.rs is the
          # authoritative gate; this is the second line of defense.
          prerelease: ${{ needs.build.outputs.is_prerelease == 'true' }}
