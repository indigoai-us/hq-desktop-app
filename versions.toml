# Single source of truth for hq-desktop-app version and release identity.
#
# This is ONE app (install-then-sync), so there is one version and one updater stream.
# Owner decisions (2026-06-24):
#   - One product, one version. Tracks the shipping hq-sync 0.9.x line.
#   - Supersedes hq-installer, hq-sync 0.8.x, hq-sync-win 0.6.4.
#   - Updater manifests under https://downloads.getindigo.ai/hq-desktop-app.
#   - Windows exposes the operator surfaces (library_local, marketplace, messages, projects_local).
#   - Windows bundle identifier migrates to ai.indigo.hq at a DELIBERATE later cutover
#     (needs a one-time bridge for existing Windows users); the macOS and Windows
#     identifiers below are PRESERVED for the first unified release so in-place updates work.
#
# `scripts/version-app.ts` stamps the app's package.json, Tauri config, Cargo.toml,
# and Cargo.lock from this file; release CI refuses to build on any mismatch.

[product]
name = "HQ Sync"          # OS-facing display name — open question (HQ Sync vs HQ Desktop)
version = "0.9.6"
base_crate = "hq-sync-menubar"

[updater]
manifest_base = "https://downloads.getindigo.ai/hq-desktop-app"
channels = ["stable", "beta", "alpha"]
# e.g. https://downloads.getindigo.ai/hq-desktop-app/stable/latest.json
# The installer's disabled-updater setting must NOT survive the merge; the unified app
# enables tauri-plugin-updater + bundle.createUpdaterArtifacts = true.

[identity]
# Preserved for the first unified release (do not change without a bridge build).
identifier_macos = "ai.indigo.hq-sync-menubar"
identifier_windows = "ai.indigo.hq-sync-win"
# Deliberate later cutover target for Windows.
identifier_windows_target = "ai.indigo.hq"

[platforms]
# Honest targets until Recall packaging supports more.
macos = "aarch64-apple-darwin"     # Recall/GStreamer is arm64-only
windows = "x86_64-pc-windows-msvc" # Windows Recall sidecar ARM64 not yet proven
windows_shows_operator_surfaces = true
